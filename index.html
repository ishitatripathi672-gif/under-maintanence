<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Under Maintenance</title>
    
    <!-- Google Fonts Inter & Bricolage Grotesque -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a; /* Deep dark slate */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }
        body::before { top: 10%; left: 15%; }
        body::after { bottom: 10%; right: 15%; }

        /* Main Container */
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
            z-index: 1;
            animation: fadeIn 1.2s ease-out;
        }

        /* --- ANIMATION GRAPHICS --- */
        .animation-box {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pulsing Outer Ring */
        .pulse-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        /* The Main Gear */
        .gear {
            position: relative;
            width: 100px;
            height: 100px;
            background: #6366f1; /* Indigo */
            border-radius: 50%;
            animation: rotateGear 8s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
        }

        /* Gear Teeth */
        .gear::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 15px dashed #6366f1;
            transform: scale(1.2);
        }

        /* Inner Hole of Gear */
        .gear-inner {
            width: 40px;
            height: 40px;
            background: #0f172a;
            border-radius: 50%;
            z-index: 2;
        }

        /* Secondary Smaller Gear */
        .gear-small {
            position: absolute;
            top: 40px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #14b8a6; /* Teal */
            border-radius: 50%;
            animation: rotateGearAnti 6s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.4);
        }

        .gear-small::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 10px dashed #14b8a6;
            transform: scale(1.2);
        }

        .gear-small .gear-inner {
            width: 24px;
            height: 24px;
        }

        /* --- TEXT & CONTENT --- */
        h1 {
            /* Applying Bricolage Grotesque for the primary heading */
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 18px;
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 35px;
            letter-spacing: -0.01em;
        }

        /* Top Notification Badge */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.25);
            color: #818cf8;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        /* Progress Bar */
        .progress-container {
            width: 75%;
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 65%; 
            background: linear-gradient(90deg, #6366f1, #14b8a6);
            border-radius: 10px;
            animation: progressLoading 3s ease-in-out infinite alternate;
        }

        /* --- KEYFRAMES (ANIMATIONS) --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateGearAnti {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.4; }
            50% { transform: scale(1.15); opacity: 0.9; }
            100% { transform: scale(0.95); opacity: 0.4; }
        }

        @keyframes progressLoading {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.4rem; }
            p { font-size: 1rem; }
            .animation-box { transform: scale(0.85); margin-bottom: 15px;}
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Animated Graphics Area -->
        <div class="animation-box">
            <div class="pulse-ring"></div>
            <div class="gear">
                <div class="gear-inner"></div>
            </div>
            <div class="gear-small">
                <div class="gear-inner"></div>
            </div>
        </div>

        <!-- Text Content -->
        <div class="badge">We'll be right back</div>
        <h1>Under Maintenance</h1>
        <p>We are currently upgrading our servers and tuning up the engine to give you a much better experience. Everything will be up and running shortly.</p>
        
        <!-- Animated Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

</body>
</html>
